# ============================================================
# Nav2 配置文件 - 适配自定义差速机器人
# 
# 机器人参数:
#   底盘半径: 0.16m, 加轮子后外沿: 0.20m
#   轮距: 0.36m, 轮子半径: 0.06m
#   最大线速度: 0.5 m/s (导航时保守一点)
#   最大角速度: 1.5 rad/s
#   激光雷达: 8m, 10Hz
# ============================================================

# ==================== AMCL 定位 ====================
amcl:
  ros__parameters:
    use_sim_time: True
    # 运动模型噪声参数（差速机器人）
    alpha1: 0.2      # 旋转引起的旋转噪声
    alpha2: 0.2      # 平移引起的旋转噪声
    alpha3: 0.2      # 平移引起的平移噪声
    alpha4: 0.2      # 旋转引起的平移噪声
    alpha5: 0.2      # 全向机器人才用
    
    base_frame_id: "base_footprint"     # ⭐ 你的机器人base frame
    global_frame_id: "map"
    odom_frame_id: "odom"
    
    # 激光模型参数
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 8.0                # ⭐ 匹配你的激光最大距离
    laser_min_range: 0.15               # ⭐ 匹配你的激光最小距离
    laser_model_type: "likelihood_field"
    max_beams: 180                       # ⭐ 从60提高到180，你有720点
    
    # 粒子滤波参数
    max_particles: 2000
    min_particles: 500
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    
    robot_model_type: "nav2_amcl::DifferentialMotionModel"  # 差速模型
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 1.0            # ⭐ 从10.0降到1.0（更严格）
    
    # 更新触发条件
    update_min_a: 0.2                    # 转 0.2rad 更新一次
    update_min_d: 0.25                   # 移动 0.25m 更新一次
    
    # 激光测量模型权重
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    scan_topic: scan

amcl_map_client:
  ros__parameters:
    use_sim_time: True

amcl_rclcpp_node:
  ros__parameters:
    use_sim_time: True


# ==================== 行为树导航器 ====================
bt_navigator:
  ros__parameters:
    use_sim_time: True
    global_frame: map
    robot_base_frame: base_footprint    # ⭐ 修改
    odom_topic: /diff_drive_controller/odom  # ⭐ 修改为你的odom话题
    bt_loop_duration: 10
    default_server_timeout: 20
    
    plugin_lib_names:
    - nav2_compute_path_to_pose_action_bt_node
    - nav2_compute_path_through_poses_action_bt_node
    - nav2_smooth_path_action_bt_node
    - nav2_follow_path_action_bt_node
    - nav2_spin_action_bt_node
    - nav2_wait_action_bt_node
    - nav2_back_up_action_bt_node
    - nav2_drive_on_heading_bt_node
    - nav2_clear_costmap_service_bt_node
    - nav2_is_stuck_condition_bt_node
    - nav2_goal_reached_condition_bt_node
    - nav2_goal_updated_condition_bt_node
    - nav2_globally_updated_goal_condition_bt_node
    - nav2_is_path_valid_condition_bt_node
    - nav2_initial_pose_received_condition_bt_node
    - nav2_reinitialize_global_localization_service_bt_node
    - nav2_rate_controller_bt_node
    - nav2_distance_controller_bt_node
    - nav2_speed_controller_bt_node
    - nav2_truncate_path_action_bt_node
    - nav2_truncate_path_local_action_bt_node
    - nav2_goal_updater_node_bt_node
    - nav2_recovery_node_bt_node
    - nav2_pipeline_sequence_bt_node
    - nav2_round_robin_node_bt_node
    - nav2_transform_available_condition_bt_node
    - nav2_time_expired_condition_bt_node
    - nav2_path_expiring_timer_condition
    - nav2_distance_traveled_condition_bt_node
    - nav2_single_trigger_bt_node
    - nav2_is_battery_low_condition_bt_node
    - nav2_navigate_through_poses_action_bt_node
    - nav2_navigate_to_pose_action_bt_node
    - nav2_remove_passed_goals_action_bt_node
    - nav2_planner_selector_bt_node
    - nav2_controller_selector_bt_node
    - nav2_goal_checker_selector_bt_node
    - nav2_controller_cancel_bt_node
    - nav2_path_longer_on_approach_bt_node
    - nav2_wait_cancel_bt_node
    - nav2_spin_cancel_bt_node
    - nav2_back_up_cancel_bt_node
    - nav2_drive_on_heading_cancel_bt_node

bt_navigator_rclcpp_node:
  ros__parameters:
    use_sim_time: True


# ==================== 控制器（DWB局部规划）====================
controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    # 进度检查器
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    # 目标检查器
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.2              # ⭐ 到达目标 20cm 精度
      yaw_goal_tolerance: 0.2             # ⭐ 角度 0.2rad 精度

    # ⭐ DWB局部规划器 - 匹配你的机器人动力学
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: True
      
      # ⭐ 速度限制（对应你yaml里的max_velocity）
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.5                      # 从0.26改为0.5
      max_vel_y: 0.0                      # 差速机器人不能横移
      max_vel_theta: 1.5                  # 从1.0改为1.5
      min_speed_xy: 0.0
      max_speed_xy: 0.5                   # ⭐
      min_speed_theta: 0.0
      
      # ⭐ 加速度限制（对应你yaml里的max_acceleration）
      acc_lim_x: 1.0                      # 从2.5降到1.0
      acc_lim_y: 0.0
      acc_lim_theta: 2.0                  # 从3.2降到2.0
      decel_lim_x: -1.0
      decel_lim_y: 0.0
      decel_lim_theta: -2.0
      
      # 轨迹采样
      vx_samples: 20
      vy_samples: 5
      vtheta_samples: 40                  # ⭐ 从20提高，转弯更平滑
      sim_time: 2.0                       # ⭐ 从1.7提高，预测更远
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.2              # ⭐
      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: True
      stateful: True
      
      # 评分器（决定路径选择）
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: True


# ==================== 局部代价地图 ====================
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint    # ⭐ 修改
      use_sim_time: True
      rolling_window: true
      width: 3                             # 3m x 3m
      height: 3
      resolution: 0.05                     # 5cm分辨率
      robot_radius: 0.20                   # ⭐ 机器人半径 20cm
      plugins: ["voxel_layer", "inflation_layer"]
      
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.40             # ⭐ 从0.55降到0.4（膨胀半径 = 2倍机器人半径）
      
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 8.0          # ⭐ 匹配激光8m
          raytrace_min_range: 0.0
          obstacle_max_range: 7.5          # ⭐ 稍小于max
          obstacle_min_range: 0.0
      
      static_layer:
        map_subscribe_transient_local: True
      always_send_full_costmap: True
  
  local_costmap_client:
    ros__parameters:
      use_sim_time: True
  local_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: True


# ==================== 全局代价地图 ====================
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint    # ⭐ 修改
      use_sim_time: True
      robot_radius: 0.20                   # ⭐ 机器人半径
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 8.0          # ⭐
          raytrace_min_range: 0.0
          obstacle_max_range: 7.5          # ⭐
          obstacle_min_range: 0.0
      
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.40             # ⭐
      always_send_full_costmap: True
  
  global_costmap_client:
    ros__parameters:
      use_sim_time: True
  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: True


# ==================== 地图服务 ====================
map_server:
  ros__parameters:
    use_sim_time: True
    yaml_filename: "my_map.yaml"              # ⭐ 改为你的地图文件名

map_saver:
  ros__parameters:
    use_sim_time: True
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True


# ==================== 全局路径规划 ====================
planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: True
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false                     # false=Dijkstra, true=A*
      allow_unknown: true

planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: True


# ==================== 路径平滑器 ====================
smoother_server:
  ros__parameters:
    use_sim_time: True
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True


# ==================== 行为服务（恢复行为）====================
behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom
    robot_base_frame: base_footprint       # ⭐ 修改
    transform_tolerance: 0.1
    use_sim_time: true
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.5                # ⭐ 匹配你的最大角速度
    min_rotational_vel: 0.4
    rotational_acc_lim: 2.0                # ⭐ 匹配你的角加速度


# ==================== robot_state_publisher ====================
robot_state_publisher:
  ros__parameters:
    use_sim_time: True


# ==================== 路径点跟随 ====================
waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200


# ==================== ⭐ 速度平滑器（新增，很重要！）====================
velocity_smoother:
  ros__parameters:
    use_sim_time: True
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.5, 0.0, 1.5]          # ⭐ [linear_x, linear_y, angular_z]
    min_velocity: [-0.5, 0.0, -1.5]
    max_accel: [1.0, 0.0, 2.0]             # ⭐ 匹配你的加速度限制
    max_decel: [-1.0, 0.0, -2.0]
    odom_topic: "/diff_drive_controller/odom"  # ⭐
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0